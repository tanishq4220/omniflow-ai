<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniFlow AI | Production Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.5);
      --text: #f8fafc;
      --muted: #94a3b8;
      --red: #ef4444;
      --yellow: #f59e0b;
      --green: #10b981;
      --glass: rgba(30, 41, 59, 0.7);
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
    body { background:var(--bg); color:var(--text); overflow-x:hidden; min-height:100vh; }
    header { padding: 20px 40px; background: var(--glass); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .logo { font-size:24px; font-weight:700; background:linear-gradient(90deg, #60a5fa, #c084fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; display:flex; align-items:center; gap:10px; }
    .status-pill { padding:6px 12px; background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3); border-radius:100px; color:var(--green); font-size:12px; font-weight:600; display:flex; align-items:center; gap:6px; }
    .status-dot { width:8px; height:8px; background:var(--green); border-radius:50%; box-shadow:0 0 10px var(--green); animation:pulse 2s infinite; }
    @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.4; } 100% { opacity:1; } }
    .layout { display:grid; grid-template-columns:260px 1fr; min-height:calc(100vh - 84px); }
    sidebar { background:rgba(15,23,42,0.5); border-right:1px solid rgba(255,255,255,0.05); padding:30px 20px; }
    .nav-item { padding:14px 18px; border-radius:12px; color:var(--muted); cursor:pointer; transition:0.3s; margin-bottom:8px; display:flex; align-items:center; gap:12px; font-weight:500; }
    .nav-item:hover { background:rgba(255,255,255,0.05); color:var(--text); }
    .nav-item.active { background:var(--accent); color:white; box-shadow:0 10px 20px rgba(59,130,246,0.3); }
    main { padding:40px; }
    .page { display:none; animation:fadeIn 0.4s ease-out; }
    .page.active { display:block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:24px; margin-top:30px; }
    .glass-card { background:var(--surface); border:1px solid rgba(255,255,255,0.05); border-radius:24px; padding:28px; position:relative; overflow:hidden; transition:0.3s; }
    .card-title { font-size:14px; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:8px; margin-bottom:16px; text-transform:uppercase; }
    .metric-value { font-size:40px; font-weight:700; margin-bottom:8px; }
    .control-panel { background:var(--surface); border-radius:24px; padding:30px; display:grid; grid-template-columns:1fr 1fr; gap:30px; border:1px solid rgba(255,255,255,0.05); }
    .input-group { margin-bottom:20px; }
    .input-group label { display:block; font-size:13px; color:var(--muted); margin-bottom:8px; }
    .input-group input { width:100%; padding:14px 18px; background:var(--surface2); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; outline:none; }
    .btn { padding:14px 28px; border-radius:12px; border:none; cursor:pointer; font-weight:600; transition:0.3s; display:inline-flex; align-items:center; gap:10px; }
    .btn-primary { background:var(--accent); color:white; shadow:0 8px 16px rgba(59,130,246,0.3); }
    .result-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-top:20px; }
    .result-item { background:rgba(255,255,255,0.03); padding:16px; border-radius:16px; }
    .result-label { font-size:11px; color:var(--muted); text-transform:uppercase; }
    .result-value { font-size:20px; font-weight:700; }
    .heatmap-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; width:100%; aspect-ratio:1; }
    .heatmap-cell { border-radius:8px; transition:0.5s; background:var(--surface2); }
    .log-feed { height:400px; overflow-y:auto; background:rgba(0,0,0,0.2); border-radius:12px; padding:15px; font-family:monospace; font-size:12px; }
    #sim-error { display:none; padding:12px; background:rgba(239,68,68,0.1); border:1px solid var(--red); color:var(--red); border-radius:12px; margin-bottom:20px; }
    .chart-container { height:120px; display:flex; align-items:flex-end; gap:6px; }
    .chart-bar { flex:1; background:var(--accent); border-radius:4px 4px 0 0; position:relative; }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>🌌</span> OmniFlow AI</div>
  <div class="status-pill"><div class="status-dot"></div>System Live</div>
</header>

<div class="layout">
  <sidebar>
    <div class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard')"><span>📊</span> Dashboard</div>
    <div class="nav-item" id="nav-simulation" onclick="showPage('simulation')"><span>⚙️</span> Simulation</div>
    <div class="nav-item" id="nav-heatmap" onclick="showPage('heatmap')"><span>🔥</span> Heatmap</div>
    <div class="nav-item" id="nav-alerts" onclick="showPage('alerts')"><span>🔔</span> Alerts <span id="alertCount">0</span></div>
    <div class="nav-item" id="nav-logs" onclick="showPage('logs')"><span>📋</span> Logs</div>
  </sidebar>

  <main>
    <!-- PAGE: Dashboard -->
    <div class="page active" id="page-dashboard">
      <div class="grid">
        <div class="glass-card">
          <div class="card-title">Overload Factor</div>
          <div class="metric-value" id="overload-val">--</div>
        </div>
        <div class="glass-card">
          <div class="card-title">Crowd Density (CDI)</div>
          <div class="metric-value" id="cdi-val">--</div>
        </div>
        <div class="glass-card">
          <div class="card-title">Queue Wait Time</div>
          <div class="metric-value" id="wait-val">--</div>
        </div>
        <div class="glass-card">
          <div class="card-title">Experience Score</div>
          <div class="metric-value" id="exp-val">--</div>
        </div>
      </div>
      <div class="grid" style="grid-template-columns: 2fr 1fr">
        <div class="glass-card">
          <div class="card-title">Density Trend</div>
          <div class="chart-container" id="cdi-chart"></div>
        </div>
        <div class="glass-card">
           <div class="card-title">API Status</div>
           <div id="ep-health" style="font-size:12px;margin-bottom:8px">Checking...</div>
           <div id="last-update" style="font-size:12px;color:var(--muted)">--</div>
        </div>
      </div>
    </div>

    <!-- PAGE: Simulation -->
    <div class="page" id="page-simulation">
      <div id="sim-error"></div>
      <div class="control-panel">
        <div class="input-group"><label>People Count</label><input type="number" id="people_count" value="45000"></div>
        <div class="input-group"><label>Max Capacity</label><input type="number" id="max_capacity" value="30000"></div>
        <div class="input-group"><label>Queue Length</label><input type="number" id="queue_length" value="1200"></div>
        <div class="input-group"><label>Service Rate</label><input type="number" id="service_rate" value="150"></div>
        <div class="input-group"><label>Emotion Score</label><input type="number" id="emotion_score" value="65"></div>
        <button class="btn btn-primary" id="analyze-btn" onclick="runAnalysis()">⚡ Run Analysis</button>
      </div>
      <div class="grid" style="margin-top:20px" id="sim-results">
        <div class="glass-card">
           <div class="result-grid">
              <div class="result-item"><div class="result-label">Overload</div><div class="result-value" id="overload-sim">--</div></div>
              <div class="result-item"><div class="result-label">CDI</div><div class="result-value" id="cdi-sim">--</div></div>
              <div class="result-item"><div class="result-label">Wait Time</div><div class="result-value" id="wait-sim">--</div></div>
              <div class="result-item"><div class="result-label">Risk</div><div class="result-value" id="risk-sim">--</div></div>
           </div>
        </div>
      </div>
    </div>

    <!-- PAGE: Heatmap -->
    <div class="page" id="page-heatmap">
      <div class="glass-card">
        <div class="card-title">Venue Heatmap</div>
        <div id="heatmapGrid" class="heatmap-grid"></div>
      </div>
    </div>

    <!-- PAGE: Alerts -->
    <div class="page" id="page-alerts">
      <div class="glass-card">
        <div class="card-title">System Alerts</div>
        <div id="alertsContainer"></div>
      </div>
    </div>

    <!-- PAGE: Logs -->
    <div class="page" id="page-logs">
      <div class="glass-card">
        <div class="log-feed" id="log-feed"></div>
      </div>
    </div>
  </main>
</div>

<script>
  // STEP 4: SAFE FUNCTIONS
  function safeSet(id, value) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = value;
  }

  function safeHTML(id, value) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = value;
  }

  // STEP 1 & 2: UPDATE UI
  function updateUI(data) {
    if (!data) return;

    // Dashboard
    safeSet("overload-val", data.overload_factor.toFixed(2) + "x");
    safeSet("cdi-val", data.cdi.toFixed(1));
    safeSet("wait-val", data.wait_time.toFixed(1) + " min");
    safeSet("exp-val", data.score.toFixed(1));

    // Simulation
    safeSet("overload-sim", data.overload_factor.toFixed(2) + "x");
    safeSet("cdi-sim", data.cdi.toFixed(1));
    safeSet("wait-sim", data.wait_time.toFixed(1) + "m");
    safeSet("risk-sim", data.risk_level);

    safeSet("last-update", "Last update: " + new Date().toLocaleTimeString());

    renderAlerts(data);
    renderHeatmap(data);
    updateTrend(data.cdi);
  }

  // STEP 5: FIX ALERTS
  function renderAlerts(data) {
    const container = document.getElementById("alertsContainer");
    const badge = document.getElementById("alertCount");
    if (!container) return;
    container.innerHTML = "";
    const alerts = data.alerts || [];
    if (alerts.length === 0) {
      container.innerHTML = "<div>✅ No alerts</div>";
      if (badge) badge.textContent = "0";
      return;
    }
    alerts.forEach(a => {
      const div = document.createElement("div");
      let bg = "#1e293b";
      if (a.includes("CRITICAL")) bg = "#7f1d1d";
      else if (a.includes("HIGH")) bg = "#78350f";
      div.style.background = bg;
      div.style.padding = "10px";
      div.style.borderRadius = "8px";
      div.style.margin = "6px 0";
      div.style.color = "white";
      div.textContent = a;
      container.appendChild(div);
    });
    if (badge) badge.textContent = alerts.length;
  }

  // STEP 6: FIX HEATMAP
  function renderHeatmap(data) {
    const grid = document.getElementById("heatmapGrid");
    if (!grid) return;
    grid.innerHTML = "";
    (data.heatmap || []).forEach(v => {
      const cell = document.createElement("div");
      let color = "#22c55e";
      if (v > 1.5) color = "#ef4444";
      else if (v > 1) color = "#f59e0b";
      cell.style.background = color;
      cell.className = "heatmap-cell";
      grid.appendChild(cell);
    });
  }

  // API FLOW
  async function runAnalysis() {
    const errEl = document.getElementById('sim-error');
    const payload = {
      people_count: parseInt(document.getElementById('people_count').value),
      max_capacity: parseInt(document.getElementById('max_capacity').value),
      queue_length: parseInt(document.getElementById('queue_length').value),
      service_rate: parseFloat(document.getElementById('service_rate').value),
      emotion_score: parseFloat(document.getElementById('emotion_score').value)
    };

    try {
      const tokenResponse = await fetch("/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: "admin", password: "password123" })
      });
      const { access_token } = await tokenResponse.json();

      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + access_token },
        body: JSON.stringify(payload)
      });
      const j = await res.json();
      
      const flat = {
        cdi: j.analysis.cdi,
        wait_time: j.analysis.wait_time,
        score: j.experience_score,
        risk_level: j.analysis.safety_risk,
        overload_factor: j.analysis.overload_factor,
        alerts: j.analysis.alerts,
        heatmap: j.analysis.heatmap
      };
      updateUI(flat);
      if(errEl) errEl.style.display = 'none';
    } catch (err) {
      console.error(err);
      safeHTML("sim-error", "⚠️ Reconnecting to intelligence system...");
      const el = document.getElementById("sim-error");
      if(el) el.style.display = "block";
    }
  }

  // Trends
  const trendData = [];
  function updateTrend(val) {
    trendData.push(val);
    if(trendData.length > 10) trendData.shift();
    const container = document.getElementById("cdi-chart");
    if(!container) return;
    container.innerHTML = trendData.map(v => `<div class="chart-bar" style="height:${v}%"></div>`).join('');
  }

  // Navigation & Init
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
  }

  setInterval(runAnalysis, 5000);
  window.onload = runAnalysis;
</script>
</body>
</html>
